    speaker: "Dashun Wang"
    title: "TBD"
    abstract: "TBD"
    bio: "Dashun Wang is the Kellogg Chair of Technology and a Professor at the Kellogg School of Management and McCormick School of Engineering at Northwestern University. At Kellogg, he is the Founding Director of the Northwestern Innovation Institute, the Founding Co-Director of the Ryan Institute on Complexity, and the Founding Director of the Center for Science of Science and Innovation (CSSI). He is also a core faculty member at the Northwestern Institute on Complex Systems (NICO). His current research focus is the Science of Science, a quest to turn the scientific methods and curiosities upon science itself. He uses and develops tools from complexity sciences and artificial intelligence to broadly explore the opportunities for innovation and promises of prosperity offered by the recent data explosion in science. His research has been published in journals like Nature and Science, and it has been featured in virtually all major global media outlets. Dashun is a recipient of multiple awards for his research and teaching, including the AFOSR Young Investigator award, Poets &amp; Quants Best 40 Under 40 Professors, Complex Systems Society's Junior Scientific Award, the Erdos-Renyi Prize, Thinkers50 Radar, and more."

